name: Update TRMNL Fleet Tracker
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-flights:
    runs-on: ubuntu-latest
    steps:
      - name: Track fleet and update TRMNL
        uses: actions/github-script@v7
        env:
          AIRLABS_API_KEY: ${{ secrets.AIRLABS_API_KEY }}
          TRMNL_WEBHOOK_FLIGHTS: ${{ secrets.TRMNL_WEBHOOK_FLIGHTS }}
        with:
          script: |
            const aircraft = [
              { reg: "N903AR", hex: "ac7a61" },
              { reg: "N904AR", hex: "ac7e18" }
            ];

            // Known airport coordinates cache (persists within this run)
            const airportCoords = {};

            async function getAirportCoords(code) {
              if (!code || code === "???") return null;
              if (airportCoords[code]) return airportCoords[code];
              try {
                const res = await fetch(
                  `https://airlabs.co/api/v9/airports?iata_code=${code}&api_key=${process.env.AIRLABS_API_KEY}&_fields=iata_code,lat,lng`
                );
                const data = await res.json();
                if (data.response && data.response.length > 0) {
                  airportCoords[code] = { lat: data.response[0].lat, lon: data.response[0].lng };
                  return airportCoords[code];
                }
              } catch(e) { console.log(`Airport lookup error: ${e.message}`); }
              return null;
            }

            function toRad(d) { return d * Math.PI / 180; }
            function haversine(lat1, lon1, lat2, lon2) {
              const R = 3440.065;
              const dLat = toRad(lat2 - lat1);
              const dLon = toRad(lon2 - lon1);
              const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
              return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }

            function compassDir(deg) {
              const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
              return dirs[Math.round(deg / 22.5) % 16];
            }

            const allFlights = [];

            // Step 1: Check OpenSky for real-time positions (FREE, unlimited)
            try {
              const hexList = aircraft.map(a => a.hex).join("&icao24=");
              const osRes = await fetch(
                `https://opensky-network.org/api/states/all?icao24=${hexList}`
              );

              if (!osRes.ok) {
                console.log(`OpenSky error: ${osRes.status}`);
              }

              const osData = await osRes.json();
              const states = osData.states || [];

              for (const ac of aircraft) {
                const state = states.find(s => s[0] === ac.hex);

                if (state) {
                  // Aircraft is airborne!
                  const callsign = (state[1] || "").trim();
                  const lat = state[6];
                  const lon = state[5];
                  const altMeters = state[7] || state[13] || 0;
                  const alt = Math.round(altMeters * 3.28084);
                  const speedMs = state[9] || 0;
                  const speed = Math.round(speedMs * 1.94384);
                  const heading = state[10] ? Math.round(state[10]) : 0;
                  const headingDir = state[10] ? compassDir(state[10]) : "";
                  const onGround = state[8];

                  if (onGround) {
                    allFlights.push({
                      reg: ac.reg, flight: callsign || "--", dep: "--", arr: "--",
                      status: "on-ground", alt: "0", speed: "0",
                      heading: "--", progress: "0", eta: "--:--",
                      active: false
                    });
                    console.log(`${ac.reg}: On ground (detected by OpenSky)`);
                    continue;
                  }

                  // Step 2: Get flight details from AirLabs (only when aircraft is flying)
                  let dep = "???";
                  let arr = "???";
                  let flightNum = callsign || "N/A";
                  let progress = 0;
                  let etaStr = "--:--";

                  try {
                    const alRes = await fetch(
                      `https://airlabs.co/api/v9/flights?api_key=${process.env.AIRLABS_API_KEY}&hex=${ac.hex}`
                    );
                    const alData = await alRes.json();
                    if (alData.response && alData.response.length > 0) {
                      const f = alData.response[0];
                      dep = f.dep_iata || f.dep_icao || "???";
                      arr = f.arr_iata || f.arr_icao || "???";
                      flightNum = f.flight_iata || f.flight_icao || callsign || "N/A";

                      // Calculate progress using airport coordinates
                      const depApt = await getAirportCoords(dep);
                      const arrApt = await getAirportCoords(arr);

                      if (depApt && arrApt && lat && lon) {
                        const totalDist = haversine(depApt.lat, depApt.lon, arrApt.lat, arrApt.lon);
                        const flown = haversine(depApt.lat, depApt.lon, lat, lon);
                        progress = Math.max(1, Math.min(Math.round((flown / totalDist) * 100), 99));

                        const remaining = totalDist - flown;
                        if (speed > 0) {
                          const hoursLeft = remaining / speed;
                          const eta = new Date(Date.now() + hoursLeft * 3600000);
                          etaStr = eta.toLocaleTimeString("en-US", {
                            hour: "2-digit", minute: "2-digit",
                            hour12: false, timeZone: "America/New_York"
                          });
                        }
                      }
                    }
                  } catch(e) {
                    console.log(`AirLabs lookup for ${ac.reg}: ${e.message}`);
                  }

                  allFlights.push({
                    reg: ac.reg, flight: flightNum,
                    dep, arr, status: "en-route",
                    alt: String(alt), speed: String(speed),
                    heading: `${heading}° ${headingDir}`,
                    progress: String(progress), eta: etaStr,
                    active: true
                  });
                  console.log(`${ac.reg}: ✈ ${dep}→${arr} | ${progress}% | ${alt}ft | ${speed}kts | ETA ${etaStr}`);

                } else {
                  // Not found in OpenSky = on ground or out of coverage
                  allFlights.push({
                    reg: ac.reg, flight: "--", dep: "--", arr: "--",
                    status: "on-ground", alt: "0", speed: "0",
                    heading: "--", progress: "0", eta: "--:--",
                    active: false
                  });
                  console.log(`${ac.reg}: On ground`);
                }
              }
            } catch(e) {
              console.log(`OpenSky fetch error: ${e.message}`);
              // Fallback: mark both as unknown
              for (const ac of aircraft) {
                allFlights.push({
                  reg: ac.reg, flight: "--", dep: "--", arr: "--",
                  status: "error", alt: "0", speed: "0",
                  heading: "--", progress: "0", eta: "--:--",
                  active: false
                });
              }
            }

            // Ensure we always have 2 entries
            while (allFlights.length < 2) {
              allFlights.push({
                reg: "???", flight: "--", dep: "--", arr: "--",
                status: "error", alt: "0", speed: "0",
                heading: "--", progress: "0", eta: "--:--",
                active: false
              });
            }

            const ac1 = allFlights[0];
            const ac2 = allFlights[1];

            const now = new Date();
            const timeStr = now.toLocaleTimeString("en-US", {
              hour: "2-digit", minute: "2-digit",
              hour12: false, timeZone: "America/New_York"
            });

            const payload = {
              merge_variables: {
                ac1_reg: ac1.reg, ac1_flight: ac1.flight,
                ac1_dep: ac1.dep, ac1_arr: ac1.arr,
                ac1_status: ac1.status, ac1_alt: ac1.alt,
                ac1_speed: ac1.speed, ac1_heading: ac1.heading,
                ac1_progress: ac1.progress, ac1_eta: ac1.eta,
                ac1_active: ac1.active ? "true" : "false",
                ac2_reg: ac2.reg, ac2_flight: ac2.flight,
                ac2_dep: ac2.dep, ac2_arr: ac2.arr,
                ac2_status: ac2.status, ac2_alt: ac2.alt,
                ac2_speed: ac2.speed, ac2_heading: ac2.heading,
                ac2_progress: ac2.progress, ac2_eta: ac2.eta,
                ac2_active: ac2.active ? "true" : "false",
                last_check: timeStr,
                cache_bust: now.getTime().toString()
              }
            };

            const trmnlRes = await fetch(process.env.TRMNL_WEBHOOK_FLIGHTS, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            console.log(`TRMNL: ${trmnlRes.ok ? "✅" : "❌"} ${trmnlRes.status}`);
            console.log(`Checked at: ${timeStr} ET`);
