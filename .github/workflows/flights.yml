name: Update TRMNL Fleet Tracker
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-flights:
    runs-on: ubuntu-latest
    steps:
      - name: Track fleet and update TRMNL
        uses: actions/github-script@v7
        env:
          AIRLABS_API_KEY: ${{ secrets.AIRLABS_API_KEY }}
          TRMNL_WEBHOOK_FLIGHTS: ${{ secrets.TRMNL_WEBHOOK_FLIGHTS }}
        with:
          script: |
            const aircraft = [
              { reg: "N903AR", hex: "ac7a61" },
              { reg: "N904AR", hex: "ac7e18" }
            ];

            const airportCoords = {};

            async function getAirportCoords(code) {
              if (!code || code === "???" || code === "--") return null;
              if (airportCoords[code]) return airportCoords[code];
              try {
                const res = await fetch(
                  `https://airlabs.co/api/v9/airports?iata_code=${code}&api_key=${process.env.AIRLABS_API_KEY}&_fields=iata_code,lat,lng`
                );
                const data = await res.json();
                if (data.response && data.response.length > 0) {
                  airportCoords[code] = { lat: data.response[0].lat, lon: data.response[0].lng };
                  return airportCoords[code];
                }
              } catch(e) { console.log(`Airport lookup error: ${e.message}`); }
              return null;
            }

            function toRad(d) { return d * Math.PI / 180; }
            function haversine(lat1, lon1, lat2, lon2) {
              const R = 3440.065;
              const dLat = toRad(lat2 - lat1);
              const dLon = toRad(lon2 - lon1);
              const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
              return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }

            function compassDir(deg) {
              const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
              return dirs[Math.round(deg / 22.5) % 16];
            }

            async function checkOpenSky(hex) {
              try {
                const res = await fetch(`https://opensky-network.org/api/states/all?icao24=${hex}`);
                if (!res.ok) {
                  console.log(`OpenSky returned ${res.status} for ${hex}`);
                  return null;
                }
                const data = await res.json();
                console.log(`OpenSky response for ${hex}: ${data.states ? data.states.length + " states" : "no states"}`);
                if (data.states && data.states.length > 0) {
                  return data.states[0];
                }
              } catch(e) {
                console.log(`OpenSky error for ${hex}: ${e.message}`);
              }
              return null;
            }

            async function checkAirLabs(hex, reg) {
              try {
                const res = await fetch(
                  `https://airlabs.co/api/v9/flights?api_key=${process.env.AIRLABS_API_KEY}&hex=${hex}`
                );
                const data = await res.json();
                if (data.response && data.response.length > 0) {
                  return data.response[0];
                }
              } catch(e) {
                console.log(`AirLabs error for ${reg}: ${e.message}`);
              }
              return null;
            }

            const allFlights = [];

            for (const ac of aircraft) {
              // Try OpenSky first (free, unlimited)
              const osState = await checkOpenSky(ac.hex);

              if (osState && !osState[8]) {
                // Aircraft found and airborne in OpenSky
                const callsign = (osState[1] || "").trim();
                const lat = osState[6];
                const lon = osState[5];
                const altMeters = osState[7] || osState[13] || 0;
                const alt = Math.round(altMeters * 3.28084);
                const speedMs = osState[9] || 0;
                const speed = Math.round(speedMs * 1.94384);
                const heading = osState[10] ? Math.round(osState[10]) : 0;
                const headingDir = osState[10] ? compassDir(osState[10]) : "";

                // Get route info from AirLabs (uses 1 API call)
                let dep = "???";
                let arr = "???";
                let flightNum = callsign || "N/A";
                let progress = 0;
                let etaStr = "--:--";

                const alFlight = await checkAirLabs(ac.hex, ac.reg);
                if (alFlight) {
                  dep = alFlight.dep_iata || alFlight.dep_icao || "???";
                  arr = alFlight.arr_iata || alFlight.arr_icao || "???";
                  flightNum = alFlight.flight_iata || alFlight.flight_icao || callsign || "N/A";

                  const depApt = await getAirportCoords(dep);
                  const arrApt = await getAirportCoords(arr);

                  if (depApt && arrApt && lat && lon) {
                    const totalDist = haversine(depApt.lat, depApt.lon, arrApt.lat, arrApt.lon);
                    const flown = haversine(depApt.lat, depApt.lon, lat, lon);
                    progress = Math.max(1, Math.min(Math.round((flown / totalDist) * 100), 99));

                    const remaining = totalDist - flown;
                    if (speed > 0) {
                      const hoursLeft = remaining / speed;
                      const eta = new Date(Date.now() + hoursLeft * 3600000);
                      etaStr = eta.toLocaleTimeString("en-US", {
                        hour: "2-digit", minute: "2-digit",
                        hour12: false, timeZone: "America/New_York"
                      });
                    }
                  }
                }

                allFlights.push({
                  reg: ac.reg, flight: flightNum, dep, arr,
                  status: "en-route", alt: String(alt), speed: String(speed),
                  heading: `${heading}° ${headingDir}`,
                  progress: String(progress), eta: etaStr,
                  active: true
                });
                console.log(`${ac.reg}: ✈ ${dep}→${arr} | ${progress}% | ${alt}ft | ${speed}kts | ETA ${etaStr} [OpenSky+AirLabs]`);

              } else if (osState && osState[8]) {
                // Found in OpenSky but on ground
                allFlights.push({
                  reg: ac.reg, flight: "--", dep: "--", arr: "--",
                  status: "on-ground", alt: "0", speed: "0",
                  heading: "--", progress: "0", eta: "--:--",
                  active: false
                });
                console.log(`${ac.reg}: On ground [OpenSky]`);

              } else {
                // Not in OpenSky — try AirLabs as fallback
                console.log(`${ac.reg}: Not found in OpenSky, trying AirLabs...`);
                const alFlight = await checkAirLabs(ac.hex, ac.reg);

                if (alFlight && alFlight.status !== "on-ground") {
                  const lat = alFlight.lat;
                  const lon = alFlight.lng;
                  const alt = alFlight.alt ? Math.round(alFlight.alt * 3.28084) : 0;
                  const speed = alFlight.speed ? Math.round(alFlight.speed * 0.539957) : 0;
                  const heading = alFlight.dir ? Math.round(alFlight.dir) : 0;
                  const headingDir = alFlight.dir ? compassDir(alFlight.dir) : "";
                  const dep = alFlight.dep_iata || alFlight.dep_icao || "???";
                  const arr = alFlight.arr_iata || alFlight.arr_icao || "???";
                  const flightNum = alFlight.flight_iata || alFlight.flight_icao || "N/A";

                  let progress = 0;
                  let etaStr = "--:--";

                  const depApt = await getAirportCoords(dep);
                  const arrApt = await getAirportCoords(arr);

                  if (depApt && arrApt && lat && lon) {
                    const totalDist = haversine(depApt.lat, depApt.lon, arrApt.lat, arrApt.lon);
                    const flown = haversine(depApt.lat, depApt.lon, lat, lon);
                    progress = Math.max(1, Math.min(Math.round((flown / totalDist) * 100), 99));

                    const remaining = totalDist - flown;
                    if (speed > 0) {
                      const hoursLeft = remaining / speed;
                      const eta = new Date(Date.now() + hoursLeft * 3600000);
                      etaStr = eta.toLocaleTimeString("en-US", {
                        hour: "2-digit", minute: "2-digit",
                        hour12: false, timeZone: "America/New_York"
                      });
                    }
                  }

                  allFlights.push({
                    reg: ac.reg, flight: flightNum, dep, arr,
                    status: "en-route", alt: String(alt), speed: String(speed),
                    heading: `${heading}° ${headingDir}`,
                    progress: String(progress), eta: etaStr,
                    active: true
                  });
                  console.log(`${ac.reg}: ✈ ${dep}→${arr} | ${progress}% | ${alt}ft | ${speed}kts | ETA ${etaStr} [AirLabs fallback]`);

                } else {
                  allFlights.push({
                    reg: ac.reg, flight: "--", dep: "--", arr: "--",
                    status: "on-ground", alt: "0", speed: "0",
                    heading: "--", progress: "0", eta: "--:--",
                    active: false
                  });
                  console.log(`${ac.reg}: On ground [AirLabs fallback]`);
                }
              }

              // Small delay between aircraft to respect rate limits
              await new Promise(r => setTimeout(r, 2000));
            }

            while (allFlights.length < 2) {
              allFlights.push({
                reg: "???", flight: "--", dep: "--", arr: "--",
                status: "error", alt: "0", speed: "0",
                heading: "--", progress: "0", eta: "--:--",
                active: false
              });
            }

            const ac1 = allFlights[0];
            const ac2 = allFlights[1];

            const now = new Date();
            const timeStr = now.toLocaleTimeString("en-US", {
              hour: "2-digit", minute: "2-digit",
              hour12: false, timeZone: "America/New_York"
            });

            const payload = {
              merge_variables: {
                ac1_reg: ac1.reg, ac1_flight: ac1.flight,
                ac1_dep: ac1.dep, ac1_arr: ac1.arr,
                ac1_status: ac1.status, ac1_alt: ac1.alt,
                ac1_speed: ac1.speed, ac1_heading: ac1.heading,
                ac1_progress: ac1.progress, ac1_eta: ac1.eta,
                ac1_active: ac1.active ? "true" : "false",
                ac2_reg: ac2.reg, ac2_flight: ac2.flight,
                ac2_dep: ac2.dep, ac2_arr: ac2.arr,
                ac2_status: ac2.status, ac2_alt: ac2.alt,
                ac2_speed: ac2.speed, ac2_heading: ac2.heading,
                ac2_progress: ac2.progress, ac2_eta: ac2.eta,
                ac2_active: ac2.active ? "true" : "false",
                last_check: timeStr,
                cache_bust: now.getTime().toString()
              }
            };

            const trmnlRes = await fetch(process.env.TRMNL_WEBHOOK_FLIGHTS, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            console.log(`TRMNL: ${trmnlRes.ok ? "✅" : "❌"} ${trmnlRes.status}`);
            console.log(`Checked at: ${timeStr} ET`);
