name: Update TRMNL Schedule
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Process Schedule with Gemini
        uses: actions/github-script@v7
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRMNL_WEBHOOK_SCHEDULE: ${{ secrets.TRMNL_WEBHOOK_SCHEDULE }}
        with:
          script: |
            const crypto = require('crypto');
            const creds = JSON.parse(process.env.GOOGLE_CREDENTIALS);
            
            // 1. Authenticate with Google Drive
            const jwtHeader = Buffer.from(JSON.stringify({ alg: "RS256", typ: "JWT" })).toString("base64url");
            const now = Math.floor(Date.now() / 1000);
            const jwtClaim = Buffer.from(JSON.stringify({
              iss: creds.client_email,
              scope: "https://www.googleapis.com/auth/drive.readonly",
              aud: "https://oauth2.googleapis.com/token",
              exp: now + 3600,
              iat: now
            })).toString("base64url");

            const sign = crypto.createSign("RSA-SHA256");
            sign.update(`${jwtHeader}.${jwtClaim}`);
            const signature = sign.sign(creds.private_key, "base64url");
            const jwt = `${jwtHeader}.${jwtClaim}.${signature}`;

            const tokenRes = await fetch("https://oauth2.googleapis.com/token", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
            });
            const tokenData = await tokenRes.json();
            const accessToken = tokenData.access_token;

            // 2. Find the newest PDF in your folder
            const folderId = '17Ry-JFX2xdDM7TJNArCQ26lbbDW2JEwf';
            const searchRes = await fetch(
              `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType%3D'application%2Fpdf'+and+trashed%3Dfalse&orderBy=modifiedTime+desc&pageSize=1&fields=files(id,name)`,
              { headers: { Authorization: `Bearer ${accessToken}` } }
            );
            const searchData = await searchRes.json();
            if (!searchData.files || searchData.files.length === 0) throw new Error("No PDF found in folder.");
            const file = searchData.files[0];

            // 3. Download PDF and convert to Base64
            const dlRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
              headers: { Authorization: `Bearer ${accessToken}` }
            });
            const pdfBuffer = await dlRes.arrayBuffer();
            const base64PDF = Buffer.from(pdfBuffer).toString("base64");

            // 4. Send to Gemini
            const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`;
            const geminiRes = await fetch(geminiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [
                  { inline_data: { mime_type: "application/pdf", data: base64PDF } },
                  { text: "Find Paulo in Captains. Identify the month/year. Return ONLY raw JSON: {\"month\":\"MonthName\",\"year\":2026,\"days\":{\"1\":\"R\",\"2\":\"X\"...}}" }
                ]}]
              })
            });
            
            const geminiData = await geminiRes.json();
            const responseText = geminiData.candidates[0].content.parts[0].text;
            const schedule = JSON.parse(responseText.match(/\{[\s\S]*\}/)[0]);

            // 5. Prepare TRMNL Payload
            const days = schedule.days;
            const allDays = Object.keys(days).map(Number).sort((a,b) => a-b);
            const today = new Date();
            const currentDay = today.getUTCDate();
            const isCurrentMonth = schedule.month.toLowerCase() === today.toLocaleString('en-US', { month: 'long', timeZone: 'UTC' }).toLowerCase();

            const calendarData = allDays.map(d => {
              const status = days[d];
              const isR = status === 'R';
              const isFirstR = isR && days[d - 1] !== 'R';
              const isLastR = isR && days[d + 1] !== 'R';
              let type = (isFirstR || isLastR) ? 'buffer' : (status === 'R' ? 'working' : (status === 'V' ? 'vacation' : 'off'));
              const todayClass = (isCurrentMonth && d === currentDay) ? 'today' : '';
              return `${d}:${type}:${todayClass}`;
            }).join(',');

            const firstDayOfWeek = new Date(`${schedule.month} ${allDays[0]}, ${schedule.year}`).getDay();

            await fetch(process.env.TRMNL_WEBHOOK_SCHEDULE, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                merge_variables: {
                  schedule_month: schedule.month,
                  schedule_year: String(schedule.year),
                  calendar_data: calendarData,
                  first_day: String(firstDayOfWeek),
                  total_r: String(allDays.filter(d => days[d] === "R").length),
                  total_x: String(allDays.filter(d => days[d] === "X").length),
                  total_v: String(allDays.filter(d => days[d] === "V").length),
                  cache_bust: Date.now().toString()
                }
              })
            });
            console.log(`✅ Success! Updated for ${schedule.month}`);
