name: Update TRMNL Schedule
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Process Schedule with Gemini
        uses: actions/github-script@v7
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRMNL_WEBHOOK_SCHEDULE: ${{ secrets.TRMNL_WEBHOOK_SCHEDULE }}
        with:
          script: |
            const crypto = require('crypto');
            const creds = JSON.parse(process.env.GOOGLE_CREDENTIALS);
            
            // 1. Google Drive Auth
            const jwtHeader = Buffer.from(JSON.stringify({ alg: "RS256", typ: "JWT" })).toString("base64url");
            const now = Math.floor(Date.now() / 1000);
            const jwtClaim = Buffer.from(JSON.stringify({
              iss: creds.client_email,
              scope: "https://www.googleapis.com/auth/drive.readonly",
              aud: "https://oauth2.googleapis.com/token",
              exp: now + 3600,
              iat: now
            })).toString("base64url");

            const sign = crypto.createSign("RSA-SHA256");
            sign.update(`${jwtHeader}.${jwtClaim}`);
            const signature = sign.sign(creds.private_key, "base64url");
            const jwt = `${jwtHeader}.${jwtClaim}.${signature}`;

            const tokenRes = await fetch("https://oauth2.googleapis.com/token", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
            });
            const tokenData = await tokenRes.json();
            const access_token = tokenData.access_token;

            // 2. Search the Folder for the Newest PDF
            const folderId = '17Ry-JFX2xdDM7TJNArCQ26lbbDW2JEwf';
            const searchRes = await fetch(
              `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType%3D'application%2Fpdf'+and+trashed%3Dfalse&orderBy=modifiedTime+desc&pageSize=1&fields=files(id,name)`,
              { headers: { Authorization: `Bearer ${access_token}` } }
            );
            const searchData = await searchRes.json();
            const file = searchData.files[0];

            // 3. Download the PDF
            const dlRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
              headers: { Authorization: `Bearer ${access_token}` }
            });
            const base64PDF = Buffer.from(await dlRes.arrayBuffer()).toString("base64");

            // 4. Gemini API Call
            const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`;
            const promptText = `
            You are reading an aviation bid award schedule grid. Locate the specific row for Captain 'Paulo'. Carefully extract his day-by-day schedule for the entire month. 
            Use this STRICT decoding legend:
            - 'R' = R
            - 'X' = X
            - 'V' = V
            - Any other alphanumeric code in a grid cell (like PT, PC, LC, etc.) = SIM
            - Empty/blank cells should be inferred based on the column alignment, usually meaning X.
            
            Return ONLY a valid JSON object. No markdown, no commentary.
            Format: {"month":"April","year":2026,"days":{"1":"R","2":"X","3":"SIM","4":"V"}}
            `;
            
            const geminiRes = await fetch(geminiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [
                  { inline_data: { mime_type: "application/pdf", data: base64PDF } },
                  { text: promptText }
                ]}]
              })
            });
            
            const gData = await geminiRes.json();
            const rawText = gData.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
            const schedule = JSON.parse(rawText);

            // DEBUG PRINT: This will show up in the GitHub Logs!
            console.log("=== GEMINI DECODED SCHEDULE ===");
            console.log(JSON.stringify(schedule, null, 2));
            console.log("===============================");

            // 5. Build TRMNL Data
            const days = schedule.days;
            const allDays = Object.keys(days).map(Number).sort((a,b)=>a-b);
            
            const today = new Date();
            const currentDay = today.getUTCDate();
            const isCurrentMonth = schedule.month.toLowerCase() === today.toLocaleString('en-US', { month: 'long', timeZone: 'UTC' }).toLowerCase();

            const calendarData = allDays.map(d => {
              const status = days[d] || 'X';
              
              const isR = status === 'R';
              const isFirstR = isR && days[d - 1] !== 'R';
              const isLastR = isR && days[d + 1] !== 'R';
              
              let type = 'off';
              if (isFirstR || isLastR) {
                type = 'buffer';
              } else if (status === 'R' || status === 'SIM') {
                type = 'working';
              } else if (status === 'V') {
                type = 'vacation';
              }
              
              const todayClass = (isCurrentMonth && d === currentDay) ? 'today' : '';
              return `${d}:${type}:${todayClass}`;
            }).join(',');

            const firstDay = new Date(`${schedule.month} 1, ${schedule.year}`).getDay();

            await fetch(process.env.TRMNL_WEBHOOK_SCHEDULE, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                merge_variables: {
                  schedule_month: schedule.month,
                  schedule_year: String(schedule.year),
                  calendar_data: calendarData,
                  first_day: String(firstDay),
                  total_r: String(allDays.filter(d => days[d] === 'R' || days[d] === 'SIM').length),
                  total_x: String(allDays.filter(d => days[d] === 'X' || !days[d]).length),
                  total_v: String(allDays.filter(d => days[d] === 'V').length),
                  cache_bust: String(Date.now()) // FIXED: Forcing TRMNL to update!
                }
              })
            });
