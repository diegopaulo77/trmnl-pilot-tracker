name: Update TRMNL Schedule
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Process Schedule with Gemini
        uses: actions/github-script@v7
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRMNL_WEBHOOK_SCHEDULE: ${{ secrets.TRMNL_WEBHOOK_SCHEDULE }}
        with:
          script: |
            const crypto = require('crypto');
            const creds = JSON.parse(process.env.GOOGLE_CREDENTIALS);
            
            // 1. Google Drive Auth
            const jwt = crypto.createSign("RSA-SHA256").update(Buffer.from(JSON.stringify({alg:"RS256",typ:"JWT"})).toString("base64url")+'.'+Buffer.from(JSON.stringify({iss:creds.client_email,scope:"https://www.googleapis.com/auth/drive.readonly",aud:"https://oauth2.googleapis.com/token",exp:Math.floor(Date.now()/1000)+3600,iat:Math.floor(Date.now()/1000)})).toString("base64url")).sign(creds.private_key, "base64url");
            const tokenRes = await fetch("https://oauth2.googleapis.com/token", {method:"POST",body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
            const {access_token} = await tokenRes.json();

            // 2. Get April PDF
            const dlRes = await fetch(`https://www.googleapis.com/drive/v3/files/1H45zcAJQlaKT1bu0ABODaJlhbfUq-nOY?alt=media`, {headers:{Authorization:`Bearer ${access_token}`}});
            const base64PDF = Buffer.from(await dlRes.arrayBuffer()).toString("base64");

            // 3. Gemini API Call (UPGRADED TO 2.5 FLASH)
            const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`;
            const geminiRes = await fetch(geminiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [
                  { inline_data: { mime_type: "application/pdf", data: base64PDF } },
                  { text: "Find 'Paulo' in Captains. Identify month/year. Return ONLY JSON: {\"month\":\"April\",\"year\":2026,\"days\":{\"1\":\"R\",\"2\":\"X\"...}}" }
                ]}]
              })
            });
            
            const gData = await geminiRes.json();
            if (!gData.candidates) {
              console.log(JSON.stringify(gData));
              throw new Error("Gemini error - check logs");
            }
            
            const schedule = JSON.parse(gData.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());

            // 4. Send to TRMNL
            const days = schedule.days;
            const allDays = Object.keys(days).map(Number).sort((a,b)=>a-b);
            const calendarData = allDays.map(d => `${d}:${days[d]==='R'?'working':(days[d]==='V'?'vacation':'off')}:`).join(',');
            const firstDay = new Date(`${schedule.month} 1, ${schedule.year}`).getDay();

            await fetch(process.env.TRMNL_WEBHOOK_SCHEDULE, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                merge_variables: {
                  schedule_month: schedule.month,
                  schedule_year: String(schedule.year),
                  calendar_data: calendarData,
                  first_day: String(firstDay),
                  total_r: String(allDays.filter(d=>days[d]==='R').length),
                  total_x: String(allDays.filter(d=>days[d]==='X').length),
                  total_v: String(allDays.filter(d=>days[d]==='V').length)
                }
              })
            });
